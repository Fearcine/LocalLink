version: '3.8'

services:
  # MongoDB
  mongo:
    image: mongo:7.0
    container_name: locallink-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: locallink
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - locallink-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: locallink-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/locallink
      JWT_SECRET: ${JWT_SECRET:-changethisinprod}
      JWT_EXPIRES_IN: 7d
      MOCK_OTP: 'true'
      MOCK_OTP_CODE: '123456'
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      ADMIN_SECRET: ${ADMIN_SECRET:-locallink_admin_2024}
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - mongo
    networks:
      - locallink-network

  # Frontend (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: locallink-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - locallink-network

volumes:
  mongo_data:

networks:
  locallink-network:
    driver: bridge
